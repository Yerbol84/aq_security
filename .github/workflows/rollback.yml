name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - staging
          - production
      revision:
        description: 'Revision number to rollback to (leave empty for previous)'
        required: false
        type: string

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure kubectl
      run: |
        if [ "${{ github.event.inputs.environment }}" == "production" ]; then
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          NAMESPACE="production"
        else
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          NAMESPACE="staging"
        fi
        export KUBECONFIG=kubeconfig
        echo "NAMESPACE=$NAMESPACE" >> $GITHUB_ENV

    - name: Check current deployment
      run: |
        export KUBECONFIG=kubeconfig
        echo "Current deployment status:"
        kubectl get deployment aq-security -n ${{ env.NAMESPACE }}
        echo ""
        echo "Rollout history:"
        kubectl rollout history deployment/aq-security -n ${{ env.NAMESPACE }}

    - name: Perform rollback
      run: |
        export KUBECONFIG=kubeconfig

        if [ -n "${{ github.event.inputs.revision }}" ]; then
          echo "Rolling back to revision ${{ github.event.inputs.revision }}"
          kubectl rollout undo deployment/aq-security -n ${{ env.NAMESPACE }} --to-revision=${{ github.event.inputs.revision }}
        else
          echo "Rolling back to previous revision"
          kubectl rollout undo deployment/aq-security -n ${{ env.NAMESPACE }}
        fi

        echo "Waiting for rollback to complete..."
        kubectl rollout status deployment/aq-security -n ${{ env.NAMESPACE }} --timeout=10m

    - name: Verify rollback
      run: |
        export KUBECONFIG=kubeconfig

        echo "Deployment after rollback:"
        kubectl get deployment aq-security -n ${{ env.NAMESPACE }}

        echo ""
        echo "Pods status:"
        kubectl get pods -n ${{ env.NAMESPACE }} -l app=aq-security

        echo ""
        echo "Recent events:"
        kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp' | tail -20

    - name: Health check
      run: |
        sleep 30

        if [ "${{ github.event.inputs.environment }}" == "production" ]; then
          URL="https://api.your-domain.com/auth/health"
        else
          URL="https://staging-api.your-domain.com/auth/health"
        fi

        echo "Checking health endpoint: $URL"

        for i in {1..10}; do
          if curl -f -s "$URL" > /dev/null; then
            echo "Health check passed!"
            exit 0
          fi
          echo "Attempt $i failed, retrying in 10s..."
          sleep 10
        done

        echo "Health check failed after 10 attempts"
        exit 1

    - name: Notify success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: '✅ Rollback successful',
            attachments: [{
              color: 'good',
              text: `Environment: ${{ github.event.inputs.environment }}\nTriggered by: ${{ github.actor }}\nRevision: ${{ github.event.inputs.revision || 'previous' }}`
            }]
          }
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

    - name: Notify failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: '🚨 Rollback FAILED',
            attachments: [{
              color: 'danger',
              text: `Environment: ${{ github.event.inputs.environment }}\nTriggered by: ${{ github.actor }}\nRevision: ${{ github.event.inputs.revision || 'previous' }}\n\nImmediate action required!`
            }]
          }
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

    - name: Create incident issue on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🚨 Rollback failed: ${{ github.event.inputs.environment }}`,
            body: `## Rollback Failure

            **Environment**: ${{ github.event.inputs.environment }}
            **Triggered by**: @${{ github.actor }}
            **Target revision**: ${{ github.event.inputs.revision || 'previous' }}
            **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ## Immediate Actions Required

            1. Check deployment status: \`kubectl get deployment aq-security -n ${{ github.event.inputs.environment }}\`
            2. Check pod logs: \`kubectl logs -n ${{ github.event.inputs.environment }} -l app=aq-security\`
            3. Review recent events: \`kubectl get events -n ${{ github.event.inputs.environment }}\`
            4. Consider manual intervention

            ## Escalation

            If unable to resolve within 15 minutes, escalate to:
            - DevOps Lead
            - Engineering Manager

            See [Rollback Runbook](docs/runbooks/rollback-procedure.md) for detailed steps.
            `,
            labels: ['incident', 'production', 'rollback-failed']
          })
