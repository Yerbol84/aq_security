version: '3.8'

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: aq_security_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aq_security}
      POSTGRES_USER: ${POSTGRES_USER:-aq_security_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aq_security_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aq_security_user} -d ${POSTGRES_DB:-aq_security}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: aq_security_redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      - aq_security_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ============================================================================
  # Data Layer (Vault Server)
  # ============================================================================
  server_data:
    build:
      context: ../server_data
      dockerfile: Dockerfile
    container_name: aq_security_data
    environment:
      DATA_SERVICE_PORT: ${DATA_SERVICE_PORT:-8090}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-aq_security}
      POSTGRES_USER: ${POSTGRES_USER:-aq_security_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "8090:8090"
    networks:
      - aq_security_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ============================================================================
  # Auth Service
  # ============================================================================
  server_auth:
    build:
      context: ../server_auth
      dockerfile: Dockerfile
    container_name: aq_security_auth
    environment:
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-8080}
      AUTH_DATA_SERVICE_URL: http://server_data:8090
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8081}
      ENV: ${ENV:-development}
    ports:
      - "8080:8080"
    networks:
      - aq_security_network
    depends_on:
      server_data:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================
networks:
  aq_security_network:
    driver: bridge
    name: aq_security_network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    name: aq_security_postgres_data
  redis_data:
    name: aq_security_redis_data
