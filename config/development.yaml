# Development Configuration
# config/development.yaml

server:
  port: 8080
  host: localhost

logging:
  level: debug
  format: json
  include_stack_trace: true

metrics:
  enabled: true
  path: /metrics

rate_limiting:
  enabled: true
  max_requests: 1000
  window_seconds: 60

dos_protection:
  enabled: true
  max_connections: 10000
  max_connections_per_ip: 100

security_headers:
  enabled: true
  x_frame_options: DENY
  x_content_type_options: nosniff
  strict_transport_security: max-age=31536000; includeSubDomains

cors:
  enabled: true
  allowed_origins:
    - http://localhost:3000
    - http://localhost:8080
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_credentials: true

database:
  host: localhost
  port: 5432
  database: aq_security_dev
  user: aq_user
  password: dev_password
  max_connections: 10

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
